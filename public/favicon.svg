<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- 主星 -->
  <circle cx="16" cy="16" r="3" fill="#6b8cff" filter="url(#glow)"/>
  <!-- 周围小星 -->
  <circle cx="10" cy="10" r="1.5" fill="#ff6b9d"/>
  <circle cx="22" cy="10" r="1.5" fill="#4ecdc4"/>
  <circle cx="10" cy="22" r="1.5" fill="#a78bfa"/>
  <circle cx="22" cy="22" r="1.5" fill="#fbbf24"/>
  <!-- 光芒 -->
  <line x1="16" y1="8" x2="16" y2="12" stroke="#6b8cff" stroke-width="0.5" opacity="0.8"/>
  <line x1="16" y1="20" x2="16" y2="24" stroke="#6b8cff" stroke-width="0.5" opacity="0.8"/>
  <line x1="8" y1="16" x2="12" y2="16" stroke="#6b8cff" stroke-width="0.5" opacity="0.8"/>
  <line x1="20" y1="16" x2="24" y2="16" stroke="#6b8cff" stroke-width="0.5" opacity="0.8"/>
</svg>
